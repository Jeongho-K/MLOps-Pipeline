<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="white" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Serving Architecture — 3-Tier Stack</text>

  <!-- ===== MAIN HORIZONTAL FLOW ===== -->

  <!-- User -->
  <rect x="30" y="112" width="100" height="72" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="146" text-anchor="middle" font-size="22">👤</text>
  <text x="80" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">User</text>

  <!-- Arrow: User → Nginx -->
  <line x1="130" y1="148" x2="195" y2="148" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="162" y="140" text-anchor="middle" font-size="8" fill="#64748b">Request/Response</text>

  <!-- Nginx -->
  <rect x="200" y="112" width="130" height="72" rx="12" fill="#f0fdf4" stroke="#009639" stroke-width="1.5" filter="url(#shadow)"/>
  <image x="212" y="122" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="240" y="134" font-size="11" font-weight="700" fill="#166534">Nginx</text>
  <text x="265" y="155" text-anchor="middle" font-size="9" fill="#475569">:80</text>
  <text x="265" y="170" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Reverse Proxy</text>

  <!-- Arrow: Nginx → Gunicorn -->
  <line x1="330" y1="148" x2="395" y2="148" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="362" y="140" text-anchor="middle" font-size="8" fill="#64748b">Upstream</text>

  <!-- Gunicorn -->
  <rect x="400" y="112" width="140" height="72" rx="12" fill="#f0fdf4" stroke="#499848" stroke-width="1.5" filter="url(#shadow)"/>
  <image x="412" y="122" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="440" y="134" font-size="11" font-weight="700" fill="#166534">Gunicorn</text>
  <text x="470" y="155" text-anchor="middle" font-size="9" fill="#475569">:8000</text>
  <text x="470" y="170" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Process Manager</text>

  <!-- Arrow: Gunicorn → FastAPI -->
  <line x1="540" y1="148" x2="605" y2="148" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="572" y="140" text-anchor="middle" font-size="8" fill="#64748b">WSGI/ASGI</text>

  <!-- FastAPI + Uvicorn -->
  <rect x="610" y="100" width="170" height="96" rx="12" fill="#ecfeff" stroke="#009688" stroke-width="1.5" filter="url(#shadow)"/>
  <image x="622" y="108" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="650" y="120" font-size="11" font-weight="700" fill="#0e7490">FastAPI + Uvicorn</text>
  <text x="695" y="148" text-anchor="middle" font-size="9" fill="#475569">Serve Predictions</text>
  <text x="695" y="163" text-anchor="middle" font-size="9" fill="#475569">Workers x N</text>
  <text x="695" y="182" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Application Server</text>

  <!-- ===== SIDE CONNECTIONS (dashed) ===== -->

  <!-- MLflow (top) -->
  <rect x="620" y="14" width="120" height="56" rx="10" fill="#eff6ff" stroke="#0194E2" stroke-width="1.5" filter="url(#shadow)"/>
  <image x="632" y="22" width="22" height="22" href="data:image/svg+xml;base64,"/>
  <text x="658" y="36" font-size="11" font-weight="700" fill="#0194E2">MLflow</text>
  <text x="680" y="53" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Model Registry</text>

  <!-- Dashed arrow: FastAPI → MLflow -->
  <line x1="680" y1="100" x2="680" y2="75" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="700" y="90" font-size="7.5" fill="#64748b">Fetch Model (REST)</text>

  <!-- MinIO (bottom-left) -->
  <rect x="560" y="238" width="120" height="56" rx="10" fill="#fef3e2" stroke="#C72E49" stroke-width="1.5" filter="url(#shadow)"/>
  <image x="572" y="246" width="22" height="22" href="data:image/svg+xml;base64,"/>
  <text x="598" y="260" font-size="11" font-weight="700" fill="#C72E49">MinIO</text>
  <text x="620" y="278" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Object Storage</text>

  <!-- Dashed arrow: FastAPI → MinIO -->
  <line x1="660" y1="196" x2="630" y2="233" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="622" y="216" font-size="7.5" fill="#64748b">Load Artifacts (S3)</text>

  <!-- Prometheus (bottom-right) -->
  <rect x="740" y="238" width="130" height="56" rx="10" fill="#fff7ed" stroke="#E6522C" stroke-width="1.5" filter="url(#shadow)"/>
  <image x="752" y="246" width="22" height="22" href="data:image/svg+xml;base64,"/>
  <text x="778" y="260" font-size="11" font-weight="700" fill="#E6522C">Prometheus</text>
  <text x="805" y="278" text-anchor="middle" font-size="8" fill="#64748b" font-style="italic">Metrics Collector</text>

  <!-- Dashed arrow: FastAPI → Prometheus -->
  <line x1="720" y1="196" x2="780" y2="233" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
  <text x="770" y="216" font-size="7.5" fill="#64748b">Expose /metrics</text>

</svg>
