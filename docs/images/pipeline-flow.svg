<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1100 220">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="220" fill="#ffffff" rx="16" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Pipeline Flow — End-to-End</text>

  <!-- Prefect orchestrator dashed box (spans DVC through MLflow) -->
  <rect x="168" y="42" width="530" height="50" rx="8" fill="none" stroke="#070E10" stroke-width="1.5" stroke-dasharray="6 3"/>
  <image x="182" y="52" width="22" height="22" href="data:image/svg+xml;base64,PHN2ZyBmaWxsPSIjMDcwRTEwIiByb2xlPSJpbWciIHZpZXdCb3g9IjAgMCAyNCAyNCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48dGl0bGU+UHJlZmVjdDwvdGl0bGU+PHBhdGggZD0iTTEyIDguMDAzIDQuMjg4IDQuMDAyIDEyIDBsNy43MTMgNHY4LjAwNEwxMiAxNnY4bC03LjcxLTR2LThMMTIgMTZWOC4wMDNaIi8+PC9zdmc+"/>
  <text x="210" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#070E10">Prefect — Orchestrate</text>

  <!-- Vertical dashed lines from Prefect box down to controlled boxes -->
  <line x1="230" y1="92" x2="230" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="350" y1="92" x2="350" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="470" y1="92" x2="470" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="590" y1="92" x2="590" y2="110" stroke="#070E10" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- === Main Flow Boxes === -->

  <!-- Box 1: Raw Data -->
  <rect x="55" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="100" y="148" text-anchor="middle" font-size="22">&#128194;</text>
  <text x="100" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#334155">Raw Data</text>
  <text x="100" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Ingest</text>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="142" x2="185" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 2: DVC -->
  <rect x="185" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <image x="218" y="120" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="230" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">DVC</text>
  <text x="230" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Version Data</text>

  <!-- Arrow 2→3 -->
  <line x1="275" y1="142" x2="305" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 3: CleanVision -->
  <rect x="305" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="350" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#6366f1">CV</text>
  <text x="350" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#334155">CleanVision</text>
  <text x="350" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Validate Images</text>

  <!-- Arrow 3→4 -->
  <line x1="395" y1="142" x2="425" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 4: PyTorch -->
  <rect x="425" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <image x="458" y="120" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="470" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">PyTorch</text>
  <text x="470" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Train Model</text>

  <!-- Arrow 4→5 -->
  <line x1="515" y1="142" x2="545" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 5: MLflow -->
  <rect x="545" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <image x="578" y="120" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="590" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">MLflow</text>
  <text x="590" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Track &amp; Register</text>

  <!-- Arrow 5→6 -->
  <line x1="635" y1="142" x2="665" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 6: FastAPI -->
  <rect x="665" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <image x="698" y="120" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="710" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">FastAPI</text>
  <text x="710" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Serve Predictions</text>

  <!-- Arrow 6→7 -->
  <line x1="755" y1="142" x2="785" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 7: Prometheus -->
  <rect x="785" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <image x="818" y="120" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="830" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#334155">Prometheus</text>
  <text x="830" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Collect Metrics</text>

  <!-- Arrow 7→8 -->
  <line x1="875" y1="142" x2="905" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box 8: Grafana -->
  <rect x="905" y="110" width="90" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <image x="938" y="120" width="24" height="24" href="data:image/svg+xml;base64,"/>
  <text x="950" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#334155">Grafana</text>
  <text x="950" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Dashboard</text>

</svg>
